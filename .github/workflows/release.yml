name: Build Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libwayland-dev libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-composite0-dev

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curlu-linux-amd64
          path: target/x86_64-unknown-linux-gnu/release/curlu

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curlu-windows-amd64
          path: target/x86_64-pc-windows-msvc/release/curlu.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create .app bundle
        run: |
          mkdir -p Curlu.app/Contents/MacOS
          cp target/aarch64-apple-darwin/release/curlu Curlu.app/Contents/MacOS/curlu
          chmod +x Curlu.app/Contents/MacOS/curlu
          cp macos/Info.plist Curlu.app/Contents/Info.plist
          codesign --force --deep --sign - Curlu.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Curlu" -srcfolder Curlu.app -ov -format UDZO curlu-macos-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curlu-macos-arm64
          path: curlu-macos-arm64.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/curlu-linux-amd64/curlu release/curlu-linux-amd64
          cp artifacts/curlu-windows-amd64/curlu.exe release/curlu-windows-amd64.exe
          cp artifacts/curlu-macos-arm64/curlu-macos-arm64.dmg release/curlu-macos-arm64.dmg

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/curlu-linux-amd64
            release/curlu-windows-amd64.exe
            release/curlu-macos-arm64.dmg
          generate_release_notes: true
